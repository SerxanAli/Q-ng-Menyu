<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mənü | Qəşəng Restoran</title>
  <!-- Google Fonts: Premium şriftlər -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (pulsuz ikonlar) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      line-height: 1.4;
    }

    /* zərif scroll davranışı */
    html {
      scroll-behavior: smooth;
    }

    /* qəşəng fon gradienti + incə texture */
    .bg-gourmet {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(25, 28, 35, 0.9), #050608);
      z-index: -2;
    }

    .bg-gourmet::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.03"><path fill="none" stroke="%23d4af7a" stroke-width="0.6" d="M70 30 L130 30 M50 50 L150 50 M40 70 L160 70 M30 90 L170 90 M40 110 L160 110 M50 130 L150 130 M70 150 L130 150 M90 170 L110 170"/><circle cx="100" cy="100" r="28" stroke="%23c9a56b" stroke-width="0.5" fill="none"/><path d="M100 50 L100 150 M50 100 L150 100" stroke="%23c9a56b" stroke-width="0.4"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.8rem 5rem;
      position: relative;
      z-index: 2;
    }

    /* başlıq hissəsi */
    .hero {
      text-align: center;
      margin-bottom: 3.5rem;
      border-bottom: 1px solid rgba(212, 175, 122, 0.25);
      padding-bottom: 2rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #F5E7D3 0%, #D4AF7A 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .hero .sub {
      font-size: 1.05rem;
      color: #b9c7d9;
      margin-top: 0.75rem;
      letter-spacing: 1px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero .sub span {
      background: rgba(212, 175, 122, 0.15);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    /* kateqoriya naviqasiyası (qəşəng büzməli) */
    .category-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 3rem;
    }

    .cat-btn {
      background: rgba(20, 24, 30, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 122, 0.4);
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .cat-btn i {
      font-size: 1rem;
      color: #d4af7a;
    }

    .cat-btn.active {
      background: #d4af7a;
      color: #0a0c10;
      border-color: #d4af7a;
      box-shadow: 0 8px 20px rgba(212, 175, 122, 0.3);
    }

    .cat-btn.active i {
      color: #1e1b16;
    }

    .cat-btn:hover:not(.active) {
      background: rgba(212, 175, 122, 0.2);
      border-color: #d4af7a;
      transform: translateY(-2px);
    }

    /* menyu grid sistemi */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    /* kart dizaynı — qəşəng, şəffaf şüşə effekti */
    .menu-card {
      background: rgba(18, 22, 28, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 36px;
      border: 1px solid rgba(212, 175, 122, 0.2);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
      box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.4);
    }

    .menu-card:hover {
      transform: translateY(-6px);
      border-color: rgba(212, 175, 122, 0.5);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
      background: rgba(22, 27, 34, 0.8);
    }

    .card-img {
      height: 190px;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 0.8rem;
    }

    .card-img .tag {
      background: #d4af7aee;
      color: #0f1115;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 1rem;
      border-radius: 30px;
      backdrop-filter: blur(2px);
      letter-spacing: 0.5px;
    }

    .card-content {
      padding: 1.5rem 1.5rem 1.7rem;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #f3eee8;
    }

    .price {
      font-weight: 700;
      font-size: 1.4rem;
      color: #d4af7a;
      background: rgba(212, 175, 122, 0.12);
      padding: 0.2rem 0.8rem;
      border-radius: 60px;
      line-height: 1;
    }

    .description {
      color: #b3c2d1;
      font-size: 0.9rem;
      line-height: 1.45;
      margin: 0.8rem 0 1rem;
      font-weight: 400;
    }

    .extra-info {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: #8f9eb2;
      border-top: 1px dashed rgba(212, 175, 122, 0.3);
      padding-top: 0.8rem;
      margin-top: 0.2rem;
    }

    .extra-info i {
      margin-right: 4px;
      color: #c9a87c;
    }

    /* kateqoriya başlığı (aktiv bölmə) */
    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 0 0 1.2rem 0.3rem;
      font-weight: 500;
      border-left: 4px solid #d4af7a;
      padding-left: 1rem;
      letter-spacing: -0.2px;
    }

    /* heç nə tapılmadı */
    .no-items {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      background: rgba(0,0,0,0.3);
      border-radius: 48px;
      font-size: 1.2rem;
      color: #b9a87c;
    }

    /* footer qəşəng */
    .footer-note {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.85rem;
      border-top: 1px solid rgba(212, 175, 122, 0.2);
      padding-top: 2rem;
      color: #8f9bb3;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .container {
        padding: 1.2rem;
      }
      .hero h1 {
        font-size: 2.4rem;
      }
      .menu-grid {
        grid-template-columns: 1fr;
      }
      .cat-btn {
        padding: 0.5rem 1.2rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-gourmet"></div>
<div class="container">
  <div class="hero">
    <h1> <i class="fas fa-utensils" style="color: #d4af7a; margin-right: 10px;"></i> Qəşəng Menyu</h1>
    <div class="sub">
      <span><i class="fas fa-leaf"></i> Təzə inqrediyentlər</span>
      <span><i class="fas fa-wine-glass-alt"></i> İmza şərablar</span>
      <span><i class="fas fa-star"></i> Şefin xüsusi təklifləri</span>
    </div>
  </div>

  <!-- Kateqoriya filtrləmə düymələri -->
  <div class="category-nav" id="categoryNav">
    <button class="cat-btn active" data-cat="all"><i class="fas fa-th-large"></i> Hamısı</button>
    <button class="cat-btn" data-cat="starter"><i class="fas fa-seedling"></i> İlk yeməklər</button>
    <button class="cat-btn" data-cat="main"><i class="fas fa-drumstick-bite"></i> Əsas yeməklər</button>
    <button class="cat-btn" data-cat="dessert"><i class="fas fa-cake-candles"></i> Desertlər</button>
    <button class="cat-btn" data-cat="drink"><i class="fas fa-martini-glass-citrus"></i> İçkilər</button>
  </div>

  <!-- Menyu kartları buraya dinamik render olunacaq -->
  <div id="menuContainer">
    <!-- JS ilə yüklənəcək -->
  </div>

  <div class="footer-note">
    <span><i class="far fa-clock"></i> Həftənin 7 günü 12:00 - 23:00</span>
    <span><i class="fas fa-map-marker-alt"></i> Bakı, Bulvar 88</span>
    <span><i class="fas fa-phone-alt"></i> +994 50 123 45 67</span>
  </div>
</div>

<script>
  // ----- Qəşəng Restoran Menyu Məlumatları (dizaynlı, zəngin) -----
  const menuData = [
    // İlk yeməklər (starter)
    { id: 1, name: "Truflı Karfaccio", price: "18.90", desc: "İncə doğranmış mal əti, parmezan, truflı sous, rukola və limon", category: "starter", image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format", tag: "İmza", calories: "380 kkal" },
    { id: 2, name: "Dəniz Məhsulları Salatı", price: "16.50", desc: "Karides, midye, kalamar, avokado, cherry pomidor və balzamik", category: "starter", image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500&auto=format", tag: "Təzə", calories: "310 kkal" },
    { id: 3, name: "Qozlu Mürəbbəli Bruschetta", price: "9.90", desc: "Çörək üstə qozlu pendir kremi, ev mürəbbəsi və kəklikotu", category: "starter", image: "https://images.unsplash.com/photo-1572695157366-5e585ab2b69f?w=500&auto=format", tag: "Vegetarian", calories: "260 kkal" },
    // Əsas yeməklər (main)
    { id: 4, name: "Odun Közünde Qaraçı Qarabasması", price: "34.90", desc: "Seçmə dana əti, qovrulmuş tərəvəzlər, kartof püresi və şef sousu", category: "main", image: "https://images.unsplash.com/photo-1600891964092-4316c288032e?w=500&auto=format", tag: "Şef Tövsiyəsi", calories: "780 kkal" },
    { id: 5, name: "Limonlu Qızılbalıq", price: "29.50", desc: "Dərman otları ilə marinadlanmış qızılbalıq, sitruslu qlazur, badam qırıntısı", category: "main", image: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=500&auto=format", tag: "Yüngül", calories: "590 kkal" },
    { id: 6, name: "Trüflü Rizotto", price: "24.90", desc: "Arborio düyü, porcini göbələyi, parmezan, ağ trüflü yağ", category: "main", image: "https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=500&auto=format", tag: "Vegetarian", calories: "670 kkal" },
    { id: 7, name: "Cacıq Sulu Toyuq Tava", price: "26.30", desc: "Zərif toyuq filesi, qaymaqlı sous, göbələk və təzə otlar", category: "main", image: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=500&auto=format", tag: "Populyar", calories: "620 kkal" },
    // Desertlər (dessert)
    { id: 8, name: "Şokoladlı Lava Kek", price: "12.90", desc: "İsti şokoladlı nüvəli, vanil dondurması və nanə", category: "dessert", image: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=500&auto=format", tag: "Qızıl desert", calories: "480 kkal" },
    { id: 9, name: "Panna Cotta - Mango Püresi", price: "9.90", desc: "İtalyan kremi, tropik meyvə sousu, təzə meyvələr", category: "dessert", image: "https://images.unsplash.com/photo-1488477181946-6428a0291779?w=500&auto=format", tag: "Glutensiz", calories: "320 kkal" },
    { id: 10, name: "Baklava Şantili", price: "11.50", desc: "Xırtıldayan qatlar, fındıq, qaymaq və bal şərbəti", category: "dessert", image: "https://images.unsplash.com/photo-1590165482129-1b8b27698780?w=500&auto=format", tag: "Ənənəvi", calories: "540 kkal" },
    // İçkilər (drink)
    { id: 11, name: "Qızıl Çay", price: "7.90", desc: "Darçın, zəncəfil, bal və limonla xüsusi qarışım", category: "drink", image: "https://images.unsplash.com/photo-1564890369478-c89ca6d9cde9?w=500&auto=format", tag: "İsti", calories: "70 kkal" },
    { id: 12, name: "Spritz Aperol", price: "12.50", desc: "Aperol, prosecco, soda, portağal dilimi", category: "drink", image: "https://images.unsplash.com/photo-1560512823-829485b8bf24?w=500&auto=format", tag: "Alkoqollu", calories: "190 kkal" },
    { id: 13, name: "Berry Smash Kokteyli", price: "9.90", desc: "Moruq, böyürtkən, rom, nanə və əzilmiş buz", category: "drink", image: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=500&auto=format", tag: "Meyvəli", calories: "210 kkal" },
    { id: 14, name: "Evdə Hazır Limonad", price: "6.50", desc: "Nanə, təzə limon, bal və mineral su", category: "drink", image: "https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=500&auto=format", tag: "Soyuq", calories: "95 kkal" }
  ];

  // Kateqoriya adlarının azərbaycanca tərcüməsi (başlıqda göstərmək üçün)
  const categoryMap = {
    starter: "İlk yeməklər",
    main: "Əsas yeməklər",
    dessert: "Desertlər",
    drink: "İçkilər"
  };

  // Kateqoriya filter elementləri
  let currentCategory = "all";

  // Menyu kartını HTML-ə çevirən funksiya (qəşəng)
  function renderMenuCards(items, container) {
    if (!items.length) {
      container.innerHTML = `<div class="no-items"><i class="fas fa-utensil-spoon"></i> Bu kateqoriyada hələ yemək yoxdur, amma şef yeni şah əsərlər üzərində işləyir...</div>`;
      return;
    }

    let cardsHTML = "";
    items.forEach(item => {
      // təsadüfi gözəllik üçün əgər image url işləməzsə fallback, lakin unsplash sağlamdır
      const imageUrl = item.image || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format";
      cardsHTML += `
        <div class="menu-card" data-id="${item.id}">
          <div class="card-img" style="background-image: linear-gradient(0deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2)), url('${imageUrl}');">
            <div class="tag">${item.tag || "Xüsusi"}</div>
          </div>
          <div class="card-content">
            <div class="title-row">
              <span class="item-name">${escapeHtml(item.name)}</span>
              <span class="price">₼ ${item.price}</span>
            </div>
            <div class="description">${escapeHtml(item.desc)}</div>
            <div class="extra-info">
              <span><i class="fas fa-fire"></i> ${item.calories || "—"}</span>
              <span><i class="fas fa-utensils"></i> ${getCategoryLocal(item.category)}</span>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = cardsHTML;
  }

  // Köməkçi: kateqoriya lokal adı
  function getCategoryLocal(cat) {
    switch(cat) {
      case 'starter': return 'İlk yemək';
      case 'main': return 'Əsas yemək';
      case 'dessert': return 'Desert';
      case 'drink': return 'İçki';
      default: return 'Xüsusi';
    }
  }

  // XSS qorunması üçün sadə escape
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // filter və render funksiyası
  function filterAndRender() {
    const menuContainer = document.getElementById("menuContainer");
    let filteredItems = [];
    if (currentCategory === "all") {
      filteredItems = [...menuData];
    } else {
      filteredItems = menuData.filter(item => item.category === currentCategory);
    }
    // hər kartı göstər
    renderMenuCards(filteredItems, menuContainer);
  }

  // kateqoriya dəyişdirən event listener + aktiv sinif
  function initCategoryButtons() {
    const buttons = document.querySelectorAll(".cat-btn");
    buttons.forEach(btn => {
      btn.addEventListener("click", function(e) {
        const cat = this.getAttribute("data-cat");
        if (!cat) return;
        currentCategory = cat;
        // aktiv sinif yenilə
        buttons.forEach(btn => btn.classList.remove("active"));
        this.classList.add("active");
        filterAndRender();
        // səhifəni bir az yuxarı scroll etmək (istəyə bağlı)
        window.scrollTo({ top: document.querySelector(".category-nav").offsetTop - 20, behavior: "smooth" });
      });
    });
  }

  // Səhifə tam yüklənəndə render et
  document.addEventListener("DOMContentLoaded", () => {
    initCategoryButtons();
    filterAndRender(); // default "all" ilə
  });
</script>
</body>
</html>
